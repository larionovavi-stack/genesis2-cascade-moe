name: Restart Genesis 2 Demo
on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle API
        run: pip install kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"alexanderlar","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Inject GH token into demo code
        run: |
          sed -i "s|os.environ.get('GH_GIST_TOKEN', '')|'${{ secrets.GH_GIST_TOKEN }}'|g" .github/kaggle_demo_code.py

      - name: Create and push notebook
        run: |
          mkdir -p /tmp/push
          cat > /tmp/push/kernel-metadata.json << 'EOF'
          {
            "id": "alexanderlar/genesis2-kaggle-demo",
            "title": "genesis2-kaggle-demo",
            "code_file": "genesis2-kaggle-demo.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": false,
            "enable_gpu": false,
            "enable_internet": true,
            "dataset_sources": ["alexanderlar/genesis2-cascade-moe-model"]
          }
          EOF

          python3 << 'PYEOF'
          import json
          code = open('.github/kaggle_demo_code.py').read()
          nb = {"cells": [{"cell_type": "code", "execution_count": None, "metadata": {"trusted": True}, "outputs": [], "source": [code]}], "metadata": {"kernelspec": {"display_name": "Python 3", "language": "python", "name": "python3"}, "language_info": {"name": "python", "version": "3.10.0"}}, "nbformat": 4, "nbformat_minor": 4}
          with open('/tmp/push/genesis2-kaggle-demo.ipynb', 'w') as f:
              json.dump(nb, f)
          PYEOF

          kaggle kernels push -p /tmp/push
          echo "Notebook pushed to Kaggle!"
